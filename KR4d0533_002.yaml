body:
  text: 夢觀集卷二元釋大圭撰七言古詩哀阮信道詩並序余欲作哀阮信道詩久矣竟不復能作而仲昭蒲君乃能作詩哀之且言其母老子幼而喪在殯者四年于茲是可哀者夫以阮之材枉於時而窮窮且死死不能葬而其母子又如君所言者雖行道之人亦哀之况同志乎然余以為徒哀之無益必使其存殁有所濟可也今君以其哀之者示諸人人使入其言阮其得所濟矣則是哀豈無益哉余遂亦作哀阮詩次君韻少微星墮南天寒先生何之魂魄單平生窮塗已屢哭身後淺土誰當看青天夢夢訴無處人間顚倒施冠屨雕蟲場屋亦偶然屠龍海國還歸去斯人己逺令人思嚮來相識驚暮遲取泉雨後茗同煮對竹雲深詩旋為百年未半成朝露地下秪今能怨慕孤兒拜客不勝衣老母啼看嘔心句眼前寂莫安足論貞曜名香看刻文仁人義士萬金産得不為爾摧心魂和詹生春雨寒歌十日春九日雨空屋貯寒寒色苦曉雪都城陌上泥暮雲不見城東樹所思今何處相去才幾許獨將寸心寄短琴琴老無絃暗塵土東風吹落錦一幅文章字字成金玉中有苦寒詞調古聲更悲賡歌我不忍上訴蒼蒼知俗眼瞳人久生脂競收瑣尾遺瑰竒野禽乘軒士徒步黃土被繡人無衣天公有意回春燠千林一夜生紅緑長年呻吟卧掩門人生不解同草木君勿歌春雨寒我有兩耳愁心百盤爐空葉已灰屋漏苔生椽簷聲夜夜春水懸人間惟我與子同此味鬢髮未白書如山春雨寒歌一闋窮逹在天愁不得當時短衣夜半悲飯牛何如學取商頌聲金石出無車出門便有路路與天長盡何處今日出門去不去去時喫苦不得住繭生腳背汗雨流草鞋穿破腳不羞大砂小刺踏入肉疼痛連心眉總蹙前村落日起孤煙客子苦饑還問宿歸來資用無一存大悔三月不出門白靣年少命運好連鑣結駟隘衢道肯信無車一生老寶公新堂歌寶公之堂天下竒十日不到思見之暗泉流來不知處盡作寶公堂下池朝朝坐客笑談裏黃金鯽魚三百尾風波不動人影閒一片青天在寒水丹梯百尺新樓開六月面面清風來青山有眼愛人好隔雲飛舞相徘徊從來山水心所向池上高歌復樓上我亦結茅歸作堂歲晚置身山水鄉賀太守雨金烏翅熱碧海紅天南旱火蒸蟲蟲眼前枯槁百物同榖價騰湧田苖空清源太守清河公愛民一念天與通黎明乞水龍王宫桑蓮華開瞻大雄神物效職毫光中奔走屏翳驅豐隆瓢翻甘霔來蒼穹餘波近逺流無窮歡謡載路歌年豐再拜民牧真吾翁下車三月恩已蒙三年惠我期有終世家閥閲開國功歸朝緩駕無忩忩紫雲席蔭羣衲藂作詩擬待觀民風八荒霖雨功益崇修名萬古齊華嵩日者劉代更生之孫清而腴淵源千載天祿書放懷自託日者學蕭然野服來通都支干生勝一出口誰從清鏡逃妍醜逹官連騎塞里閭市人懷糈爭奔走列星布置胸中天下簾一笑收百錢淫巫瞽史語神怪獨談性命非同年譊譊終朝勞頰舌旁人為君長歎息黃金臺上方急賢白首天南尚為客坦然坦然地行仙有暇與我相聨翩春風桐江呼酒船興酣夢入三神山下觀塵世磨蟻旋歸來門前客如雨窮通身外初忘言壽母歌詹先貧能養親聲聞閭閻其親高年康彊今八十矣鄉之士榮其有壽母也咸歌之余與之方外友亦歌以為子母慶清源西郭先生廬先生食貧身校書先生有母年八十綵衣白日來庭除天朝旰食求秀孝人偕計吏趨公車堂堂此士固殊衆浮湛不去將何如白頭偏親要菽水青雲有路遲吹噓堯天自樂足甘旨安仁時賦行版輿吾知忠臣出孝子有道不獨鳴州閭金花鸞誥指日至丹楓雨露無時踈先生先生勉終初功名一笑真緒餘高堂蚤夜承起居病起加餐厭寒葅來茲逾八還望九盤中好致春江魚夜聞水車旱火秋蒸土山熱新苖立死田寸裂西風何處送嗚嗚一夜水車啼不歇水車身作水中龍赤腳踏龍憐老翁白水田頭月未落千畦萬畦雲雨同流蘇醉卧誰家子有耳不聞汝啼苦水龍水龍汝勿苦及物無功得如汝次韻王觀明爛柯引汝誠王君觀棋有得遂舍所玩作歌以見志余喜而次韻和之入關爭先取秦鹿逡巡失路行孤竹相持堅壁久未出脫無人追逸足兩豪角立成敵國一决雌雄看終局西探虎穴歸不歸先聲萬里天南飛機行九地布重圍的盧一躍先逝騅眼中鷺起長江曉羣烏飛去斜陽了王家瓜葛英俊郎晚悟名教真樂鄉文楸忍涴春汗香人間日短仙日長濕螢入囊當寒雪清光不盡朣朧月南山食笋蒼龍起蟄破𤣥壤昻昻勢欲干雲上一夜風雷無處尋君家玉盤薦蕭爽詩豪搜攪冰雪腸倐忽驪珠光在掌渭川無謝千戶封金鉉空聞太牢饗主人主人好培養籬下龍孫看新長他時拄杖來叩門萬玉排簷戛清響次韻陳隲民惜春金尊㵼酒胡琴語白日長看華在樹東方一夜來戲人老紅飛盡江南雨勸君莫苦愛流芳紅顔百歲終黃土山人眼底不見春古檜陰陰翠虬舞築城曲築城築城胡為哉使君日夜憂賊來賊來猶隔三百里長驅南下無一跬吏胥督役星火催萬杵哀哀亘雲起賊來不來城且成城下人語連哭聲官言有錢雇汝築錢出自我無聊生收取人心養民力萬一猶能當盜賊不然共守城者誰解體一朝救何得吾聞金湯生禍樞為國不在城有無君不見泉州閉門不納宋天子當時有城乃如此僧兵守城行驅僧為兵守城郭不知此謀誰所作但言官以為盜防盜在深山嘯藂薄朝朝上城候㸃兵羣操長竿立槍槊相看摩頭一驚笑竹作兜鍪殊不惡平生獨抱我家法不殺為律以自縛那知今日墮卒伍使守使攻受官約謂僧非僧兵非兵未聞官以兵為謔一臨倉卒將如何盜不來時猶綽綽敵人日夜徂我城示以假兵無乃弱我官自有兵與民願放諸僧卧雲壑夢觀集卷二
