body:
  text: 夢觀集卷四元釋大圭撰七言律詩獨坐秋風一來林院深開戶自彈焦尾琴藂木寒涼獨鶴白亂雲髙下羣山隂老天有月照間坐清夜無人同苦吟古來窮餓得不朽我生與世空浮沉登雲榭老屋危臺雨氣昏石苔不見舊鑱痕當年霸業旌麾盡故國秋聲樹木存度海鴈行驚斷角近城螢火沒荒垣無人去買長瓶酒一酹陳王千載魂湖上簡間中秋近清波荷葉圓葉隂疏處見青天偶臨湖坐得佳樹欲傍花行無小船林院鶴歸山色外水亭人去夕陽前深知碧玉壺中樂一笑臨風揖地仙王丞石泉白石藂藂屋上山泉聲一道碧雲間十分如練月同色萬古不痕天照顏靜夜竹齋知雨意清秋茶鼎共僧間甘寒可濯功名念公子青袍鬢未斑詹生長材碩德見時清底事斯文未有靈天上誰傳子虛賦日斜猶草太玄經龍媒在野空思秣鹿角浮陽競闖萍顧我孤雲巖壑底相看一笑眼偏青蚤起山鐘喚我披衣起浩蕩曉隂猶未開稍覺柴門稀應接獨憐幽鳥下莓苔束書如舊嵗年晚藂木近秋風雨來一笑莫思身外事好將蘭蕙遍庭栽輔上人自京師還遂如海上省覲萬里黃金臺上客白雲回首故山深庭闈嵗月催華髮包笠秋風折寸心百福起居申定省三年音信問浮沉不從客路看眀月身在青青桑梓隂顧生材調如君許倔奇遁身藥市不求知風流談笑來東晉家世淵源接上池經驗方傳函是玉活人心在鬢成絲從今努力行醫國沉醉休歌白紵辭送錢將軍北上魯國將軍蓋世雄十年歸卧海門東舊遊臺閣諸公在當日京師萬馬同行李忽來人意外觚稜重入眼明中聖心政爾思頗牧待賜臨軒節鉞崇送吕生訪所知潮陽浩水詩名喧嶺海天南有客力吹噓夢魂秋盡繞韓木老氣年來壓鱷魚風浪扁舟酣笑語布衣行李半琴書青雲六翮看髙翥林麓何時共卜居哀王德符深期久屈一時伸白髮蓬廬竟不春在抱孤兒方識母藏書萬卷付何人繐帷像設空堂暮蕭寺琴尊異世身同社相逢俱涕落百年無復見遺民霞山逸人卜築初成在燕居紅塵飛不到林廬開門海月來清夜隱几松濤滿太虛酒熱賸招持蟹客家藏深愛相牛書城中少識龎公面逺挹髙風謝不如病起見必上人去秋所惠詩次韻閉戶春寒燕子前寥寥孤坐掩殘編中年心事誰復識南院故人殊可憐隔嵗相思詩在篋清秋憶共夜談禪交遊疏逺身多病莫笑當時孟浩然送孫計總六轡如琴仕路春司存計省政方新聖朝化洽關雎盛史筆芳聨漢吏循伯仲塤篪聞上國衣冠閥閲擅全閩此時長畫勞籌算萬一皇家憶藎臣孟上人蘭若長松短草秋風早野寺寥寥古意存老我獨來呼聖佛傳家猶喜見玄孫門前日落東湖緑舍北雲寒古嶽尊坐愛清遊歸未得多情煮茗薦盤飱貧後貧後故人憐我少秋來清興為誰多獨將好句遍題竹猶喜新衣一製荷山曲白雲朝自去樹頭孤月夜相過百年已分長冰蘗眼見風生陸地波南山隱者獨抱胸中五色霓南山髙處樂幽棲瓦牆護竹涼書牖砂井分泉潤藥畦白日杯茶多過客長年更漏一鳴雞此身未得同君隱回首杉松翠葉齊寧海橋鑿石為梁嵗月悠山川有待得談侯海橋壯觀成三趾國士勳名出一頭大浪不驚虹影濕高車齊度馬聲秋玉湖湖上通行路浩蕩餘波萬古流示上人客魚石歸詹王二生信宿天近瑤臺新月眀相思無路去尋􅉀三秋海上歸來客一夜燈前笑語聲黑髮滿頭含瘴色清貧到骨有詩情嵗寒尊酒諸公在預戒春風卜逺行南院故人至不見故人今幾日滿山風雨落花聲雲林孤坐度芳嵗杖屨一來開晚晴剪燭西窗深夜語卜鄰南嶠半生􅉀病身已是棲遲久汗漫相將遊太清用韻與史眉山别清嘯神山日未斜獨騎官馬入桐花盡驅春意蘇亭戶不遣丹心負帝家舄鹵八州瞻幕府風雲萬里接京華去時得路揚鞭濶野衲相思自摘茶答周詹二先輩過甕天緬思邃古尚巢居一室盤蝸不願餘身外置錐似無地眼中插架漫多書梅簷覔句供間趣竹榻𡨕心到物初賴有儒林炯連璧相期結社慕匡廬定居寄嶠翁囊空負我買山心珍重多情許贈金烏鵲倦飛三匝後鷦鷯初託一枝深竹窗斜日猶開卷松榻新秋自理琴從此卜居塵事少髙車莫惜過雲林過鄭氏新居芙蓉池上晚涼初萍葉青青一雨餘落日無人來洗馬小亭臨水見遊魚清吟我亦忘歸去長愛君能此卜居繞岸近栽新樹好相期重看緑扶疏至北山何處人間清意多疏松白石散巖阿道人汲水煮新茗念我攀雲到碧蘿泉谷夕隂留杖屨林廬秋色入婆娑野猿聲斷青天外便欲臨風一浩歌吳公挽詞家聲禮樂古延陵立政臨民自有經父老數州爭説尹蠻夷一節舊瞻星鄞江路接黃泉迥錦里春回玉樹青歸與淑人同穴好老成何處見儀刑故人過訪七尺長身卧故廬日斜起坐對殘書幾人嵗晚能相問一榻山中獨久虛好客新秋來杖屨小窗暮雨共盤蔬相看道義有真樂萬事悠悠總不如王中榮新亭長江東去萬銀濤逺嶼西來擁六鼇中有新亭專物色極憐吾子近風騷窗開白晝雲根立露灑清秋碧樹髙見説良宵滿欄月呼尊留客試新糟中秋雨中秋有月不可逢杖藜起踏臺前松天公一收玉兔去廣寒盡遣玄雲封歸來閉閣風雨集憶昔登樓賓客從百年人事半憂樂過眼隂晴知幾重青松山中次韻基道人金粟山髙曉雪晴柴門相對有餘清因逢好景成歸隱自許間身樂泰平白髮已無塵世夢青松新結嵗寒􅉀北林有客同岑寂旋煮溪蔬折足鐺廓上人事母疾愈髙堂傳説病逾深多少關情自不禁歸去恐無嘗藥日平生兼有織蒲心烏衣子弟皆如玉青笋啼痕欲滿林一夜秋風蘇鶴髮笑攜杖錫入雲岑送王國祥遊吳南州故人獨可憐輕别閭里何翩翩斷髮舊聞泰伯國扁舟初入鴟夷天雲連茶竈自隨去月在蘆花相對眠秖今老我不得往為傳清夢到吳堧聞世基補漳吏寄贈兼簡靈源上人捧檄天南一笑春幾年身作卧雲人相材自古出胥吏史傳後來無逸民清鏡多情猶白髮青山有路隔紅塵舊遊西寺靈源在為報衰年但隱淪十年十年不見鐘鼓食今嵗仍遭飢饉時只道民間須振貸誰憐我輩亦疲羸強持一鉢向何處自笑空囊尚有詩早覺無錢助官糴也應屠販逐羣兒吾郡吾郡從來稱佛國未聞有此食人風凶年竟遣心術變末俗何由古昔同市近秖今真有虎物靈猶自避生蟲諸公肉食無充耳急為飢民散腐紅賊起賊起南州不出兵守攻一切付諸僧便將焚誦為無益爭奈戰征非所能佛法自茲看掃地吾徒誰復辨堅冰白頭歸就儒冠老飲水茅簷樂曲肱懷惠廓聞道崎嶇盜賊間為親扶侍入深山竹林罷泣時供饌萱草忘憂不解顔亂世幾人能色養故園何日遂生還我家亦有高堂在音信寥寥道險艱不得惠舟信一去梅花嶺上村可堪羣盜起如雲汝身不識今生死消息何由逺聽聞舊隱琴書鎖秋色孤城關柝急斜曛四郊此日方多壘魂夢相尋路不分送錢介夫如臨漳别野南州鼎沸涕堪流安得如君海上遊果陷孤城誰獨免能尋樂土更無愁秫田釀酒終朝醉荆木開花一樹留亦欲奮飛憐老我丹霞何處強登樓輔上人亂後不來作客桐花苦嵗荒挽衣不住損離腸能無一壑同薇蕨秖説故山多稻粱回首想應豺斷道寄書未有鴈成行時危老我空相憶况是孤城閉夕陽用韻題松雲八景圖一到城西甘露寺只今山色似當時清談客去雲長在乞食僧還鶴正羸松柏青青猶古意茅茨厯厯有新詩曽知此地多風月寄語煩囂世上兒六言淮橋上歸别許生髙樹新涼雨意斷橋落日水聲中有幽人獨立白雲一片猶橫晚色詩情淡淡秋隂客影𡨕𡨕回頭試問淮水何時重到南亭無題樹影半窗眀月蟲聲一夜清秋我意浩然千古人間總是間愁夢觀集卷四
