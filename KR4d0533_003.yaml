body:
  text: 夢觀集卷三元釋大圭撰五言律詩重五日弔古楚國大夫去彭咸從所居秪今浮水馬何處問江魚異俗悲遺事離騷讀舊書一觴川上酒斜日雨踈踈世故世故占星變吾生共月孤此時無夢寐長恐渉艱虞山色宜茅屋松花落飯盂素心將獨往及早謝人徒萬國萬國銷兵器天戈落彗星苖民思帝力千羽舞王庭大漠秋無戰窮閻夜不扄屢聞寛大詔風浪静南溟左公督捕歸南來持斧使騎氣滿丹霞貔虎收寒幙豺狼失暮沙清風開瘴癘裔壤挹光華翼翼勲勞大桓圭立帝家寇平詶諸友相問隣州傳警急病客慰親歸海上初聞信天南已解圍弄兵民亦細臨陣將能飛好在諸君子吾生幸有依雲榭陳王成霸業故國獨斯臺寂莫千年恨傳呼五馬來秋風樟樹老殘照石碑頺舊事今誰説天晴海色開送宏上人寧親新知得之子歸夢忽丹霞一棹清江曲相看白日斜庭闈多壽色甘旨及秋瓜頼有諸兄在重依古佛家道邉古井壞甃沒荒草寒泉如許深何年有此井過客嘆無禽素綆斷新汲青松落晚陰極憐抱清洌照影獨沉吟壯嵗壯嵗不自食有懷成著書從來生計拙天意果何如樹近秋聲早苔深轍迹踈知音人豈少顧已媿空虚對梅思逺梅華開滿樹誰與共襟期有客猶千里無人寄一枝江南天欲雪嵗晚子何之愁殺黄昏月孤唫立水湄病不能寐作長身一病後生意苦無多相對孤燈在不眠清夜過向來殊可笑後日竟如何黙定行藏計餘生委薜蘿窻曙來禽語庭寒獨樹青物華猶婉娩吾道已伶俜白日荒人事殘年對佛經古來豪傑者多少老沉㝠正月游片瓦巖道人留竟日適興成詩片石成巖屋高扉寂莫濵雪晴來野客春早見幽人煙火寒山近盤蔬午甑新留連愛林麓城郭有囂塵送義講師北上清凉餘韻在敷唱得斯人白日天花雨𤣥譚麈尾春鄉書稀到蜀蠻語漸通閩去去金臺上經筵寵渥新黄仁山輓詩閲代衣冠古黄公孰與儕時清成大隱頭白尚長齋天意來多福人生竟有涯相從悲劍化雞嶺暮雲薶詶王生留别相對譚𤣥久依依别古皇夕陽幽寺好人事蚤春忙門掩香仍在山空草自長興來雲榻近杖履更何方送齊上人之浙相從久寂莫此别竟何如暮雨勞行李秋燈憶讀書枕清吳地狖舟亂淛河魚適逺多幽思吾生媿獨居何生南國有君子陰陽家者流下簾白日晏沽酒玉林秋欲去問八字知余老一丘譚天對豪傑躡屩入神州客中簡知已者天意妨吾道生涯滯客鄉風高林影亂山近雨聲長慷慨君相識飄零我自傷山中半間在屋債倩誰償顧熊父挽詞二首故國咸淳老餘生濟世心藥能全萬命家自致千金杯酒清譚足華堂戲綵深一朝成古昔埋玉上鄉岑賣藥全高節勤家有令妻相從就窀穸不自試刀圭後福延苖裔平生絶町畦江侯五色筆空復照黄泥輓黄郎堂堂江夏士意氣復誰如一笑囷傾粟長歌客有魚高名傳異域晚節在吾廬舊接清歡極秋風祖輤車善叔死母哭之哀藉甚吾宗彦天乎不永年高堂生白髪老涙到黄泉烏鳥無歸日松林有暝煙一生辛苦志身後幾人憐陳南山輓詩元龍湖海士老大閲艱難子舍傳家政僧齋話嵗寒長歸新宅兆不見古衣冠尚想平生事臨風獨永歎次韻相待山行山北尋雲去城南覔伴來相期曽宿昔一笑出塵埃市酒逢人勸春陰近午開深知凝望久攜手躡崔嵬曹吉君今浮舶去因識逺游心衣食天涯得艱難客裏禁春㠶連海市暮鼓起香林一笑歸來好高堂壽百金送逺秋色連平海悠悠送逺心征人辭夕照孤客倚寒林北去舟多雪西游橐有金何當一迴首舊隱白雲深贈徐山人别相㸔初下榻餘子漫如林人物南州士梅花嵗晚心政須同煮茗何事即分襟後日千峯裏無從聽鼔琴過必上人君居高樹下六月得清風世事不復問心期誰與同日長泉自汲隣曲逕纔通愛我重留話深秋月滿空陶生陶生真我友生恨不同今清節照當世黄花知此心衣冠思典午詩酒寄東林寂莫將千載無人歸去唫唁許生幽明分伉儷朞月廢游歌疇昔期偕老于今奈若何春魂來夢寐秋序感蹉跎一擊莊生缶憂端未覺多蘇氏嫠居三十載將母育孤兒之子有如此他人誰過之素塵生曉鏡涼月入秋帷貞節磨千古茫茫獨爾思黄山長内子輓詩閥閲鍾醇懿來嬪江夏黄同心空自結異路竟相望環珮歸何處銘旌帶夕陽十年今得葬無憾即𤣥堂和孫公子游南山帝里歸來日胸懷尚昔年人材今可數公子獨無前大斾光南寺清唫到暝煙功名方鼎鼎未許傍雲眠晚過許生遂相攜至蔡家新亭落日淮橋上因君得勝游花蹊入流水林院近清秋撫景方成玩題詩更少留悠然心迹静新月照歸休次韻星夕中年親舊逺寂莫歳時過有客山南集開尊月下歌三更來白露一水静銀河不得同清賞因詩感慨多院檄歸田于我賀主者使院來新檄蓮宫復舊田頓除經歳患應為主人賢合浦收膏壤同袍仰食天汶陽歸魯後麟筆動千年雲上人上人善醫且相以游四方余固知其寓於技者也因贈之言藻鑑高雙眼刀圭活萬人多材能濟世行橐自生春談笑諸侯客鉼盂釋氏身識真今已少誰信混光塵送嘉惠師禱雨歸郡以旱致嘉惠師禱雨未足沃村民告以師歸禳癘聽之偃松諸上人作送歸詩亦謂余作幢葢來嘉惠湯年待捄焚衣冠趨梵刹風雨起爐薰井有迴泉脉田無補地文尚何懷故里逺近一慈雲訪東寺不在東郭尋幽事高人適出游不成相問訊欲去復淹留湖近荷香入亭空樹影浮更須乘月夜行徧竹林秋送知藏者歸山君探龍藏徧猶有去來心久客流年易故山歸夢深林泉成獨往風月廢同吟别後多春哢嚶嚶聽好音晚凉知許生獨在小樓寄贈落日見山色小樓初罷書晚凉成獨立幽興在高居皓月僧鐘逺微雲鶴樹踈極憐登眺好詩律近何如簡魏文憲二首南國徴兵賦中軍重掾曹塞氛方不靖王事敢云勞匹馬秋風晚朋尊海月高澄清天下志餘事及詩騷林居長閉戸無意傍青雲此客人間少杯茶松下分神山誇獨步連率借多聞嵗晚來同社匡時早策勛送竒上人迎師櫬京師訃告南天晚趨奔朔雪寒帝鄉非故土人物已新棺哭位顔如對歸喪魄亦安師門諸子在生死一心難孫母顔氏輓詞二首五鼎侯家食伊人獨飯蔬磬聲諸佛近經卷一燈初南野空陳迹西方有浄居長歸秖遺蜕萬古閟幽墟當時禆内治懿德玉無瑕夙夜憂宗祀勤勞在主家新阡成馬鬛舊社有蓮花萬里專城使哀哀哭海涯潁川安人輓詞二章事猶姑氏從夫若大賓多儀皆婦道百歳但情親雲暗魚軒逺天寒馬鬛新歸尋泉下女曽憶鼓盆人潁水成東逝僊山正夕佳得男非我腹有後慰中懐大易家人饋周詩季女齊傷心無復見丹旐已天涯送詹海漚清谿游谿水如藍緑幽人一葉舟夕陽成獨酌山色在中流清興今誰及長吟不自休歸來期掃榻相對話良游贈孟伯眞憲郎别因謝墨竹養親須薄禄作吏本無心霜雪知清節乾坤付漫吟舊游南國滿新夢北堂深老我雲林下憑誰豁素襟墻陰數藂玉筆㡳有清風留贈非無意相期逈與同嵗寒猶特立心事一玲瓏何以酬知已猗猗在眼中題五峰巖一尋五峰老孤塔在雲端鐵樹已古色石房空晝寒風流無後輩山水入多盤見說潛公隱天華雨滿壇東濟上作大江日東去吾道竟悠悠一世幾同志百年空白頭青山猶入俗皓月不隨流安得長風便孤舟萬里浮唁基道人喪弟只謂百年内脊令相近飛急難長在眼風雨一同歸死别驚心早情親舉世稀斷雲秋日暮念爾獨何依次韻詹生懷陳衆中阮信道舊游陳與阮不見獨成吟無復此聨璧為誰重鼓琴朔方文字老南國酒杯深今日風流逺令人恨滿襟南國南國地皆赤吾生亦有窮豐年何日是菜色萬人同海上舟頻入民間楮已空猶聞榖價湧開糴若為功餽饟餽饟資邊閫南軍萬竈寒斷糧今絫月為變豈無端夜戍畱文吏秋兵􅓈武官到頭就誅戮餓死固應難桑城桑城連盜賊國楮斷新頒只少材充製非闗上有慳人情無用舊世事漸成囏陛下明如日更張一鑄山有懐不知經此亂猶及見吾親歸去嗟無路淹畱媿有身孤城閉白日四野起黄塵我里今何似區區欲問人哀鄭亢宗毎侍尊公側顔開白玉温相期成遠器何事作歸魂䑛犢能無淚瞻烏尚有恩蒼天不可問端遣幾人存病甚廓上人能來臥病百餘日擁衾山雨寒世人不我愛之子獨相㸔市藥能盈裹春蔬得滿盤一聞此問訊吾道媿艱難亂餘饑又甚雲散我廬空時運方如此人心莫與同病身須一壑天下付諸公為報平生友途今處處窮次韻詹生因所見有感四門磔羣賊餓者競趨之顧此果何物猶能療汝饑虎今生角翼民已竭膏脂無怪人相食干戈正此時夢觀集卷三
