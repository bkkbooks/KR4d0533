body:
  text: 夢觀集卷五元釋大圭撰五言絶句必上人所居竹白日炎氛逺清隂敷廣庭嵗寒抱髙節霜雪獨青青桐下井曉風吹銀床蕭蕭古相樹時有新汲人缾攜落花去龜峰絶頂危石青入雲上有千嵗木我來卧其間天風響巖谷石上久坐大石上青天行白雲野意道不得幽鳥隔林聞淩霞觀舊迹石壁立萬丈僊人青雲端不見來笙鶴落日天風寒行松林中雨欲至石磴下欲盡松林新逕開黒雲何處雨時過帽山來雨少止下山苦愛山色好獨乘清興來歸時却惆悵石逕有莓苔雨歸不向青山宿青山笑殺人黄昏獨歸去衣上雨痕新歸至中野雨色澹微陽歸情已當急空野夕凉多共對青山立山雨山雨夜鳴屋凉秋風滿林一貧纔到骨萬事已無心亦有亦有往還者自嬾與相期獨坐柴門裏青山無去時見月天地幾昏曉浮生半是眠寄聲世上客眀月為誰圓聞蛩蛩鳴東壁東蛩鳴西壁西老我中間坐逺近一聞齊遲眀山曉欲無色雞寒猶有聲客中魂夢少風雨隔林生七言絶句漁父大兒船頭新得魚小兒船頭炊彫胡老翁一笑江潮落西村有酒滿缾沽夜起野人獨卧山中屋夜半雨聲清夢熟起來竹下一開門秋入千峰月如玉顧氏亭菊顧家亭館四時佳薄暮來過到月斜徙倚不知秋色冷赤䦨干外有黄花徳林我是道林君徳林休論異趣不同心三株樹下扶疎月幾日來聴子夜琴次韻詹生臘雨不出憧憧入市蹋泥行獨有高人息外營隠几讀書心似水空齋不斷雨來聲愁生懐抱苦無端嵗晏囊空阻一歡欲折梅花當分嵗黄昏飛雪滿城寒呼同逰春山雨後碧如苔為問閒人幾个來不去題詩巖下石澗花紅白為誰開題龍引子朝天畫淵龍飛出霧如山龍子相隨闖九關遙想雲霄新得路雨聲一夜到人間書雪夜訪戴圖萬古神交共此心當時何事下山隂遙遙一棹言相訪安道門前雪正深山谷草聖涪翁醉墨動驚蛇流落人間幾嵗華長恐六丁起雷電為龍飛去玉皇家赤壁畫寒山影落大江流赤壁應難似舊游風月當年收拾盡黄州副使一扁舟和用平懐南上人三絶句寒牕貝葉共平生聴盡燈前片雨聲今日悲凉只孤坐殘編上見蠧魚行人間友道冷於秋伐木無聲萬古愁頭白東峰一遺老獨尋宿草弔荒丘寒雲長閉舊林廬魂魄歸來日已疎欲見懐人更無路空山秋色對禽魚㸔山青山逺近畫圖間落日秋風得意㸔紫翠重重歸鳥盡四牕不掩石樓寒賣書贐友故人欲行萬里外自言囊槖尚空虛我貧無物堪為贐賣却平生一束書通財我亦聞諸古空有平生氣義髙深媿窮途負朋友極憐富室積金刀長門怨娥眉無緑鏡生寒忍見銅鋪月又圓一片君王心似昨曽將金屋貯嬋娟瑤臺曲冠佩朝天逐伴歸玉簫聲裏露沾衣曲終十二樓頭月萬里青雲一鶴飛詰鬻香者戸外聲聲賣紫檀貧家誰辦買香錢如何不向朱門喚沉水烟中人醉眠鄭老人白頭含笑倒長瓢話到前朝感慨饒無復吐茵當日夢海雲樓上對春潮聞鸎竹邊睍睆夢魂驚啼破春風似有情花榭栁臺聴得慣金衣好去九重城出山自笑都將聲利付時人野鶴孤雲物外身底事半生雙白足今朝蹋破一紅塵苦旱春秧黄槁百泉枯龍骨聲中泣老夫不恨長饑委溝壑長官秋至索王租王季鴻相邀不去寄謝閉門蔵拙久雲林俎豆諸賢媿此心珍重形骸外相見春風塵壁下桐琴懐復初翁玉立清標不受塵閉門寒趣自生春東山興盡歸來後一樹梅花對病身世塗差狹道難行獨負文章一代名舊日著書無恙不人間千載子雲生鐵石平生一寸心如何西望亦沾襟藂林元氣關公等不説鍾期莫鑄金石笋溪堂白沙青樹帶人家門外溪聲一𣲖斜欲買扁舟同野老月眀吹笛入蘋花卧疾懐金粟山人身不能飛秖自愁閉門卧病盡高秋無因去作山人客長嘯清風十二樓示同袍天南為客度黄花一笑歸來共嵗華老我不知身是病自吹松火熟杯茶試論心事一開顔萬事如今只等閒病起朝朝相喚去海城西北盡青山病起簡所知清白堂前客似雲新詩唫罷倒芳尊不知尚記龍鍾不病起雲深獨掩門長恐心期媿古人半生曽未拜車塵獨憐身世枯蓬草零落秋風不見春池上緑淨涵空䕶碧苔方方一鏡向人開晚涼獨立心如洗風破浮萍片月來感蠧書魚臨牕清曉獨長吁在眼陳編有蠧魚身世區區文字底當時魯叟亦捐書聞杜宇情知望帝是前生春盡江南憶錦城到處青山山有樹如何偏起故鄉情夜宿李氏館坐我高齋笑語新此時歸思浩然生不因乘興一來往爭識孤雲物外情有懐落日孤城想故人三千客路淛江濆恨身不解相隨得目送長風北去雲南墅十二詩晦忠堂新堂猶掲舊堂名坐記當年一愴情萬里虎頭身許國歸來煙雨課春耕菱風桂露之鄉菱葉風來水氣浮桂花露濕月眀秋此時身在銀河上不躡僊槎駕玉虬一川平野雨過羣山掃緑埃無窮野色望中開漁樵往往斜陽外只隔前川喚不來水木清華春流遶屋似江湖緑樹當門作畫圖白日風波渾不見一雙鷗鳥起投壺燕寢凝香眼冷樽前舞袖紅日長高枕自清風功名擾擾平生夢分付黄雲一穟中池塘春草二儀清氣幾曽衰前輩風流可得追康樂後身孫處士一池春草夢囘時草堂杜老高風六百年茅茨那得尚依然側身西望人多少萬里橋頭不盡天處士橋無意趨時愛泬寥一溪流水斷塵囂幽人石上㸔雲坐車馬來時莫過橋山隂溪曲清溪流繞碧㠝岏便作山隂一様㸔今日戴公何處在滿船風雪不知寒總相宜船彩鷁不飛連碧波此中公子醉眠多傍人剛道相宜好夢入西湖聞棹歌翠香館萬甕吹香客到稀青帘故故舞斜暉主人家有如澠酒不脱鸘裘得醉歸嘯雲臺高臺直上接青雲一嘯晴空十里聞天上神僊平地有羣兒何事醉塵氛晨興涉園遶畦青青蔬葉凉渠水新添一尺强倚杖方知山雨過夜來底事夢魂長病起澹澹心情病始甦蛛絲風葉小牕虛秖今嚼蠟人間味嵗晏生涯有東書扁舟蘆荻風生水正肥老翁含笑坐魚磯扁舟棹入城中去白日城中滿是非歸來歸來谿上一茅堂讀罷陶詩倚石牀萬事悠悠長嘯裏閉門風雨麥秋凉懐雲橋我懐别後向誰論雪曲成時苦憶君何處有樓三百尺抱琴長對子山雲白鷗白鷗飛來磯上晴中有老翁相對清東風斜日一飛去獨照白頭江水眀茅屋茅屋隂隂水北村滿牀書卷一桐孫雨聲長在黄梅樹四月來時不出門徐老人至久聞兒輩正匆匆水國歸來一室空白日有誰來過我北隣七十二年翁戲成城郭無心寄一瓢此身便欲老山椒山童忽報松華盡又逐扁舟上早潮謝檄謝檄歸來卧白雲秖今心事與誰論故人不似蒼苔好嵗晚青青一到門寂寞寂寞荒庭總是秋菊花開晚尚風流斜陽病起一相對底事旁人不解愁珠公歸自永陽山中出其山居槀因賦政為時危去卜居不知霜雪滿頭顱歸來一笑詩成卷還記桃源路也無日日思山不肯歸年來心事固多違老禪真有誅茅地應許孤雲作伴飛八笋我屋清隂未苦濃天教頭角破苔封眀朝一一青雲上誰信山中有八龍簡郡守天子臨軒遣老臣亦憂塗炭逺方民秖應三載清如水不涴天南一㸃塵近日清聲不及初使君心事果何如盧公只作桃源縣三載猶同一下車哀殍斗米而今已十千幾人身在到眀年譙門有粥如甘露活得操瓢死道邊閔農經年不見大田秋賣盡犂鉏食養牛儻有後來耕種日一時相顧更多愁世事世事紛紛勿重陳柴門高掩百年身滿頭白髪不須薙相識如今復幾人病中鄭南村至病身如鶴寄枯林浮世無人識此心不是君來相問訊四簷風雨入呻吟夢觀集卷五
