body:
  text: 夢觀集卷一元釋大圭撰五言古詩定公生焚詩并序吾釋氏者定世古昆吾人客漳久之僑居開元寺業白以老至元四年秋峒賊來攻城甚急漳人莫知所出定密而祝曰使城不陷賊吾當火吾身以答已而果然越六年夏遂絫薪為龕室西郊行與衆訣衆留之不可乃自燔其間其火之始張也人視之泰然無豪髮惴惴色郡人咸大駭異請即其地作塔廟以祠於乎定以誓故生而自焚宜若得罪於名教者然與夫食人之食而見危不能致命立人之朝臨大節而變者不亦逺乎哉况定之心以一身全一城之死靡渝亦宜若無得罪於名教者也抑吾聞定老出世學其成就豈此哉人殆見其膚耳定之詳余實得之靈源上人源與之同居又將經始其祠者且請余為之詩曰羣凶白日至梯衝舞嚴城疇能身獨死而俾城不傾定公出茲誓金石開精誠未幾來訊醜復見溝壘清前言儻云食吾將負神明積薪自厝火怡然就無生何意金玉軀倐忽煨燼成顧此無餘事足為流俗驚塔廟遂翼翼鐘鼓初喤喤為國效死節勗哉爾簪纓逢蒙敦弓彀明月抉拾生清風一發期必中大射師友同學成遂專巧教者初無功其心既殺羿天下惟一蒙含戴亦齒髮位置三才中如何懷此逆天地或爾容囓鏃果有術肆毒應無從蚩蚩一為鑒維以保令終送吳生官平灤州學聞名不一識始識還我辭問子何所之出為百里師灤河逼幽朔士有剛勇姿一陶以禮樂揖讓中州為儻可行所學無擇官高庳上以育人材下以開民彛為國右庠序深意良在茲海風天南起桐葉初去枝諸侯起相送張飲連夕暉子有二三策宿昔獻彤墀從來志經世况有御史知茲焉發初軔逺大以相期田家日夕多鳥雀桑麻亦扶踈煙火四五家依依久同居是時雨新足野水明四渠兒童呼黃犢散漫來近墟老翁已辛苦入夜歸田廬月出猶未眠相與盡村沽今秋有租稅當春力犂鋤晚過何氏林園遂成清集賦詩日入雨新過陰陰羣木寒茲來愜林景况復得所歡所歡者為誰何掾邀數賢喜客意無倦促席聞清言取泉浸新瓜摘果來中園新亭㑹觴酌高燭明閒寬而我素不飲亦復舒芳顔喧靜固異操離合感多端深懷一飯意月出猶盤桓客趙鄭二生者談歐陽室形勝衡門何蕭條竟日抱冲寂有客方起余清懷話山澤載言歐氏居乃在龜巖側嵌空即遺構茅茨少人力上有松可樵下有泉可食行游得長林息偃亦盤石雲橫兩崖青月出雙澗白垂蘿飲羣猿密蔭㑹歸翼娛情匪一端悅目固多迹肥遁諧宿心逍遙願同適聞此感客言胡乃後良覿棲遲久欲往夢寐嘗所歷且復留清吟同宿風雨夕嘉約詎敢忘明當理巾策游龜山六月草六日同趙生鄭生許氏兄弟游龜山山之大石下有遺址相傳歐陽詹讀書于此因造焉相與慷慨賦詩分韻得魚字閒情素乖俗樂彼中林居林居未云果幽賞意有餘出郭青山多佳木亦扶踈竝遊得良友方駕從所如翠微薄炎景蘿風泛凉裾雲徑步窈窕石門入清虛少留席豐草緑縟綿以舒藂祠翳鳴鳥石澗清有魚形神一蕭散疲勩亦已祛夤緣龜巖東遂即歐陽廬懷賢仰高躅撫蹟驚廢墟願留石中室畢誦人間書茲焉恐遲暮眷眷空躊躇造唐山人居行行野田盡荒蹊入秋水何人有新屋鬱鬱松林裏欣然造其門晤言得君子解衣坐微凉超遙適閒美日淡疏雨晴山色散窗几石上聞鳥鳴林端見雲起平生事外心即此胡不喜少暇同飲泉幽期自今始次韻王季鴻遊九日山季鴻王君攜友遊九日山過姜相墓感秦隱君能為卜葬事不暴於世弔以詩余未識其人愛其詩亦次其韻有客車馬同新秋在雲巘幽尋意方愜周覽涕欲泫碧草滿地生白石抱空轉下有丞相墓奈此牛羊踐隱君昔深遁芳木足幽搴維時諒多艱此地憩重趼日長聃書盡嵗暮越山逺初月聞嘯歌歸雲同息偃鶴足喜松高魚心畏池淺有懷莫與同尚古一何緬姜公實英材悟主片言善位及台鼎崇職當諌垣選骨鯁乃左遷時運蓋多舛淡泊兩相求綢繆永云展吁嗟日南英梁棟先摧翦微爾收白骨當時委蒼蘚逸事傳海陬史氏闕光顯千載有若人遊歌始相勉往古凛高蹤來今戒駑蹇友道日以偷殷憂何繇遣送友人行雲林滿寒色送子行江臯離魂黯將别薄暮猶風濤萬里方首路一心愼所操居恆苦局促出豈圖遊敖摘珠水何深采玉山未高輝光有後得辛苦無前逃相知在伊昔散帙共明膏積齡蓄竒志識察非兒曹遠道子獨往中心我誠勞端居盡白日柴門翳蓬蒿思存不在目還往空如毛衣巾有新雪殷勤念同袍惠聲因歸翼嵗晏舒鬱陶次韻王觀明冬日感懷幽抱恆弗舒徂年矧當急方茲感朝寒忽復悲日入晏溫豈無時霜霰竟來集念之悟浮生俯仰二毛及翕翕耻竝趨終然就孤立懷我同心人蘭章無廢緝高卧思雲林世紛苦維縶發軔方自茲多岐亦屢泣窮居守簞瓢適逺困簦笈已矣各勉旃龍蛇有時蟄和詹生飲酒二篇百慮中已灰何獨未忘酒君言酒可念飲此益我壽渾然一真性毫僞寧復有醉中意尤長家人視諸友詹子真國士博學乃多能堂室有廉隅後來復誰升張生獨高義古學已川增日沽酒家保來問作詩朋相知久逾密餘子方背憎獨醒有不免熟醉良可憑一言事剛制羣狐聽春冰和再飲酒二首余既和詹生飲酒詩數日生載歌詩不謂余和而心欲余和之余知生久重違生意乃彊和生云澆醨世已甚之子但醇醇讎書南郭下獨抱希世珍所願非聲利有懷在清真日夕故人至持觴時茹新斷飲果何謂開飲詎云宜淵然一方寸欣厭共滑之伊人固殊俗於道有天資已忘欣與厭酒至無固辭南野張耉居有樓瞰城南之野因自號曰南野高樓對青山美人在南城不知市塵中白日車馬聲人樓兩相高上與雲月并手持古書坐淡淡香煙生豈必逃林莽猿鶴乃可盟彼哉宅幽昧何得居高明薰風襲太和天池挹至清歸休廣莫地優遊觀八絃茲懷復誰識時以野自名古意八首美人如瓊英被服閒以嘉獨居芳年晏媒氏絶行車當戶理清瑟曲終復咨嗟山有蘭蕙草水有夫容華盈盈絶代色日夕念無家朔風生夜寒孤妾羅帷間晨興開粧閣流淚復潺湲流光損華色佳人滿邯鄲娟娟有新悅君子不思還願君異明鏡照心毋照顔良人出不歸孤妾在中閨夢中或從行覺來但空棲歡燕一乖闊顔色日慘悽愁將清鏡照獨掩春粧啼方聞鷾鴯語日夜鳴莎雞恐君盛年去妾身賤如泥中心冀君亮終始願不攜月出照我牖獨聞林鳥鳴機中織文錦殷憂竟何成持此悅誰目良人千里征别離今幾日碧草生閒庭何當一來歸泣涕言斯情亭亭雲中鶴自昔為仙侣仙人寄之書飛來不吾與我欲凌青霞頗知塵世苦杳杳莫嗣音三山在何許大星何落落小星亦離離須臾素月出羣景遙相暉念我嘉友朋攜手同所歸盱矣道路長悵然不可期山阿有香草采采不可掬願言遺同心日夕行空谷遠道阻關河懷人在心目芳菲幸未䦨聊以身佩服白雲空中起一雨羣物滋浮生在世間徒費食與衣古人雖已死清輝照無期豈復同碌碌寂莫黃泉歸去草嵗暮孰華余幽蘭植前庭何彼蕭與蒿亦復長青青紛羅奪幽色荒穢蔽紫莖拔去在今日寢食心始寧蒿也非爾惡所懼亂芬馨答詹先問吾弟疾青春紫荆花奈此天風寒兼旬在床蓐零淚紛潺潺我生寡昆友實恐骨肉殘陰陽一為寇有甚探囊丸歘來驅瘧句展玩臨風欄上期勿藥喜下言吹篪歡感激故人意欲報空長歎山行幽齊倦孤坐高步入清旭雲散碧天空雨餘山生緑野草春已芳水禽晴更浴寂莫有所思倚遍西巖曲平窗池水白石圍方池碧泉湛清冷幽人窗下坐蕭蕭讀書影時復一洗心對此萬慮靜此心淨如月獨照一泓水終嵗湛不搖晶晶絶塵滓孰謂但清空嘉魚從中起重尋歐陽書室簡信道同游佳遊念茲山何心計修阻一來感竒逢再至欣夙覩蕭蕭讀書巖高風凛終古雜木荒女蘿遺蹤記環堵當時想禽魚英姿識龍虎而我後千齡披榛悼前武磴道方涉雲松林忽聞雨悠悠遂忘歸逺意入平楚既尋石上室復息林下宇長颸涼衣巾薄暮多笑語鄉來同苦辛殷勤問遊侣臺上晚涼未去高臺日將暮風涼未歸客長歌林木秋微靄山光寂素友適心期幽賞忘物役殷勤松間月照我歸途白白夫渠夫渠生逺陂采采升中堂汚泥失故迹清風來新香一薰塵念逺三嗅煩襟涼芳菲日以暮顧眄何繇長亭亭白玉質玩之不可忘秋雨林廬白日晦門掩清秋雨端居無與娛孤抱亦良苦開卷一慰心同人在千古病聞錢將軍過訪不果因其聽雨詩用韻謝始聞顧蓬蓽旋覺回髙軒屬余方卧疾傳呼無乃喧愛人諒以德所懼傷形魂念茲感深意藥火聊自焞今春款東閣顔色何溫溫經時不相見秋雨滿池盆伊人亦沖淡微燈坐黃昏病身有羽翼一笑及晴暾送同袍楚人不愛寶白璧埋空山賈胡得明珠置之骨肉間富貧誠自取愚智不同年方今江湖上龍門盡開關百寶浩如海虛往蘄實還居諸易云邁少壯不可閒送子即長路而我胡為然相期匪一朝顧影深自憐曽飊發中野返景明飛翰留連豈不好局促非所安驅車日以逺滿目新山川他鄉有明月夜夜照子寒行止各異趣夢寐空盤旋歸來儻及早共采桑上蓮題逺緑亭金華閒上人作亭封山絶頂因高而望羣山皆來余以遠緑名其亭而題其上名取諸唐高僧貫休詩語新亭始云搆藂木已森森城郭萬井喧翛然此中林主人愛嘉客而我來清吟朝陽麗初齊開戶羅數岑千里出毫秒雙明洞高深嵐將宿雨滴翠與浮雲沈眉濃有新黛髮沐及未簪宛轉呈姿媚頃刻移晴陰真觀落塵色爽氣開靈襟蒼煙起華薄迥見歸飛禽維茲古皇宅鄂公舊鋪金竒蹤諒神閟煥發方自今亭亭金華翁名迹詎足侵翠屏淡相對永日坐鳴琴青青亘終古可比靜者心銅爵臺高臺一曲歌西陵木將落蕭瑟繐帷寒秋風凄女樂魂魄不復來觴豆但如昨奈此白日何朝朝照銅爵次韻詹生謝許氏兄弟餽訪許生和詹生春雨寒歌且餽之油因弟訪詹致焉適出尋有詩謝余以其相與敦友道甚古可尚次韻端居念易盈獨往情自適寧知高齊閒白日來清客相望竟參商不得同几席緬然懷伊人貞姿敵金錫伊人不可見百憂寄新章未遑軒車去豈謂道里長眷彼鴻鴈序𡨕𡨕道彌光吁嗟寒士歌重我孤憤腸斯文久陵遲一縷存已僅高明掩羲娥小智曜螢燐懷哉大雅姿釋此末俗吝竊恐遂白頭寸心坐灰燼蘭膏侈新貺高義莫與倫清光六籍間悠悠自相親茲焉一喣沫奈爾俱潛鱗願言同出處往矣天池濵勢利衆所趨友道日蕪穢勞心思古人努力在吾輩相看黃髮期共攬青霞佩惟應秉素節歲寒見貞脆送同邑長高昌公北上天朝一四海荒徼猶近鄰維同去萬里監邑余有臣猗歟高昌公三年此為春絃歌響千室井里安四民一邑之風化豈不關厥身講學必四代游心在成均遇士或俊秀揖讓同薦紳時聞有折獄語及六經醇往者食險徒舟車斷通津自公一為政幡然變頑嚚即此見治效豚魚孚有仁報政及茲日星言駕侁侁卧轍似無路頌聲起連旬曰公實王佐民社暫以親故家重華閥清選皆天倫行應昭代須大惠周下人題脫將軍明寬堂一堂有向隅賓客顔如灰所以為天下勿俾異樂哀不有明與寬安得衆所諧明則見人瘼寬則可逺懷八絃亦云廣何物非春臺脫侯實知國匪直扞城材愛國如愛家矢石冒不回身居萬夫上甘苦下與偕時因凱歸暇白日東第開中堂燕朋酒髦俊千里來海邦一靜治折衝在尊罍擁旄寄方靣餘地或恢恢維侯翊王室將星炯三台具瞻方自茲曷不崇勳階僧兵歎饑民聚為盜鄰警來我疆有兵既四出頭㑹家人良趣赴義軍選萬室日夜忙吏言僧實多亦可就戎行牧守為所誤驅僧若驅羊持兵衣短夾一時俱反常伊余生不辰逢此祇涕滂慈悲以為教王臣所金湯復之勿徭賦甲令明有章胡為不爾念而此出倉皇軍旅託未學佳兵云不祥永言愧二子歸哉慎行藏哀惠廓上人甲午冬聞惠廓上人死象運山中竟不知其何如死其死何時死之信不且不可知也明年冬乃得問故於其徒惟質質能言其死狀廓初辟亂山谷間久之以侍親歸尋往奔其姑喪至則為人所殺實去歲十一月十一日也在吾門者如廓不多見而死非命天其謂何始吾欲哭不得其故不敢哭焉今哭之矣既哭為詩哀之喪亂孰為之哀哉自蒼旻蒼旻覆下土胡乃不我仁此邦失綏馭干戈起齊民一州環七邑何人匪王臣官軍久不出所至多陷淪之子在溪上奔竄如驚麏負母入巖谷承顔無賤貧辛苦復來歸亦曰問嚴親流離不忘孝如此端可人老姑實父黨赴救寧無因奈何嬰竒禍清血遂灑塵虎口諒不免龍淵宜自珍物情固多變前知詎能神悲風東南來死生苦難真欲哭殊不敢涉歲今已旬因人一問故始識遘此屯銜寃即長夜萬古嗟無晨松柏信為材刀鋸終與鄰茨棘一無用成蔭彌冬春為子獨永歎榮枯竟誰陳夢觀集卷一
