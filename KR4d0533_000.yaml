body:
  text: 夢觀集别集類四元提要臣等謹案夢觀集五卷元釋大圭撰大圭字恆白姓廖氏晉江人至正間居泉州之紫雲寺其集本二十四卷首為夢法一卷夢偈一卷夢事一卷次為詩六卷次為文十五卷所謂夢法夢偈夢事者皆宗門語録不當列之集中其雜文亦多青詞疏引不出釋氏之本色均無可取惟其詩氣骨磊落無元代纎穠之習亦無宋末江湖蔬筍之氣吳鑒稱其華實相副詞達而意到不雕鏤而工去纂組而麗屏耘鋤而秀雖朋友推奬之詞然核以所作亦不盡出於溢美蓋石湖劍南之餘風猶存於方以外矣今刋除其夢法等卷併刪除其雜文惟録古今體詩編為五卷沙礫既捐精華斯露取長棄短期於不失雅音其三乘宗㫖聽釋氏之徒自傳之固不必為彼法計也乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:68d1186848f8fffa6ad2f36bd4e5a1d25e6c471a1ae49a3b22ae12f33965ef32
